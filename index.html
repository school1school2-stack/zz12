<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار القدرات - نموذج (6)</title>
    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .quiz-container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--maroon); }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 25px; padding-bottom: 10px; }
        .question-card { margin-bottom: 20px; display: none; }
        .question-card.active { display: block; }
        .option { display: block; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .option:hover { background: #f0f0f0; }
        .option.selected { background: var(--maroon); color: white; border-color: var(--maroon); }
        .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-next { background: var(--maroon); color: white; }
        .btn-prev { background: #666; color: white; }
        #login-section { text-align: center; padding: 50px 20px; }
        input { padding: 12px; width: 80%; max-width: 300px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- قسم تسجيل الدخول والتحقق -->
    <div id="login-section">
        <h2 style="color: var(--maroon);">أهلاً بك في نموذج (6)</h2>
        <p>يرجى إدخال البريد الإلكتروني المسجل للمتابعة</p>
        <input type="email" id="studentEmail" placeholder="sxxxxxxx@rb.moe.gov.sa"><br>
        <button class="btn-next" onclick="checkAccess()">دخول الاختبار</button>
    </div>

    <!-- قسم الاختبار -->
    <div id="quiz-section" style="display: none;">
        <div class="header">
            <h3 id="student-name-display"></h3>
            <div id="progress">سؤال 1 من 0</div>
        </div>
        <div id="questions-area"></div>
        <div class="nav-btns">
            <button class="btn-prev" onclick="prevQuestion()">السابق</button>
            <button class="btn-next" id="nextBtn" onclick="nextQuestion()">التالي</button>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // مصفوفة الأسئلة - قم بتعبئتها ببيانات نموذج 6
    const questions = [
        { q: "رئة : تنفس", options: ["قلب : ضخ", "معدة : هضم", "عين : إبصار", "أذن : سمع"], correct: 2, type: "tan" },
        { q: "الجاهل يؤكد، والعالم يشك، والعاقل ........", options: ["يتروى", "يندم", "يصمت", "يصرخ"], correct: 0, type: "ekm" },
        // أضف بقية الـ 99 سؤالاً هنا مع تحديد النوع (tan, ekm, syq, st, mfr, art, ikh)
    ];

    let currentIdx = 0;
    let userAnswers = {};
    let studentData = null;

    // التحقق من وجود الطالب في قائمة الـ 181
    async function checkAccess() {
        const email = document.getElementById('studentEmail').value.trim().toLowerCase();
        if(!email) return alert("أدخل الإيميل");

        try {
            const doc = await db.collection("allowed_students").doc(email).get();
            if (doc.exists) {
                studentData = doc.data();
                studentData.email = email;
                startQuiz();
            } else {
                alert("عذراً، هذا الإيميل غير مسجل في القائمة المعتمدة.");
            }
        } catch (e) { alert("خطأ في الاتصال بقاعدة البيانات"); }
    }

    function startQuiz() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('student-name-display').innerText = "المتسابق: " + studentData.name;
        renderQuestions();
        showQuestion(0);
    }

    function renderQuestions() {
        const area = document.getElementById('questions-area');
        document.getElementById('progress').innerText = `سؤال 1 من ${questions.length}`;
        
        questions.forEach((item, index) => {
            let optionsHtml = item.options.map((opt, i) => 
                `<div class="option" onclick="selectOption(${index}, ${i}, this)">${opt}</div>`
            ).join('');
            
            area.innerHTML += `
                <div class="question-card" id="q-card-${index}">
                    <h4>${index + 1}. ${item.q}</h4>
                    ${optionsHtml}
                </div>`;
        });
    }

    function selectOption(qIdx, optIdx, el) {
        userAnswers[qIdx] = optIdx;
        const siblings = el.parentElement.querySelectorAll('.option');
        siblings.forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
    }

    function showQuestion(index) {
        document.querySelectorAll('.question-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`q-card-${index}`).classList.add('active');
        document.getElementById('progress').innerText = `سؤال ${index + 1} من ${questions.length}`;
        
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.innerText = (index === questions.length - 1) ? "إنهاء الاختبار" : "التالي";
    }

    function nextQuestion() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            showQuestion(currentIdx);
        } else {
            submitResults();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion(currentIdx);
        }
    }

    // حساب درجة كل مهارة بشكل مستقل للوحة النتائج
    function calculateSkillScore(skillType) {
        const skillQuestions = questions.filter(q => q.type === skillType);
        if (skillQuestions.length === 0) return 100; // قيمة افتراضية إذا لم يوجد أسئلة لهذا النوع
        
        let correctCount = 0;
        questions.forEach((q, index) => {
            if (q.type === skillType && userAnswers[index] === q.correct) {
                correctCount++;
            }
        });
        return Math.round((correctCount / skillQuestions.length) * 100);
    }

    async function submitResults() {
        if (!confirm("هل تريد إنهاء الاختبار وإرسال النتائج؟")) return;

        let totalScore = 0;
        questions.forEach((q, index) => {
            if (userAnswers[index] === q.correct) totalScore++;
        });

        const finalResults = {
            name: studentData.name,
            email: studentData.email,
            score: totalScore,
            total: questions.length,
            model_id: "6",
            time: firebase.firestore.FieldValue.serverTimestamp(),
            // هذه البيانات ستفهمها لوحة النتائج الذكية فوراً[cite: 2, 3]
            sections: {
                tan: calculateSkillScore("tan"), // تناظر
                ekm: calculateSkillScore("ekm"), // إكمال
                syq: calculateSkillScore("syq"), // سياقي
                st:  calculateSkillScore("st"),  // استيعاب
                mfr: calculateSkillScore("mfr"), // شاذة
                art: calculateSkillScore("art"), // ارتباط
                ikh: calculateSkillScore("ikh")  // اختلاف
            }
        };

        try {
            await db.collection("student_results").add(finalResults);
            alert("تم إرسال نتيجتك بنجاح!");
            location.reload();
        } catch (e) { alert("حدث خطأ أثناء حفظ النتيجة"); }
    }
</script>

</body>
</html>
