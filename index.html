<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي القدرات - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #800000; --accent: #d4af37; --bg: #f4f7f6; --text: #2c3e50; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; user-select: none; }
        .main-card { background: white; width: 95%; max-width: 800px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; position: relative; animation: fadeIn 0.8s ease; }
        .top-bar { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .top-bar h2 { margin: 0; font-size: 1.5rem; }
        .content { padding: 30px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; text-align: center; font-size: 1.1rem; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; }
        .btn-action { background: var(--primary); color: var(--accent); width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(128,0,0,0.3); }
        .q-box { display: none; animation: slideIn 0.5s ease; }
        .q-header { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--primary); font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .q-text { font-size: 1.4rem; line-height: 1.6; margin-bottom: 25px; color: var(--text); }
        .options-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-item { padding: 18px; border: 2px solid #f0f0f0; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .opt-item:hover { border-color: var(--accent); background: #fffcf0; }
        .opt-item.correct { background: #27ae60 !important; color: white; border-color: #27ae60 !important; }
        .opt-item.wrong { background: #e74c3c !important; color: white; border-color: #e74c3c !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; margin-right: -50px; } to { opacity: 1; margin-right: 0; } }
        #timer-ring { color: var(--primary); font-weight: bold; font-size: 1.2rem; }
        .lock-msg { text-align: center; color: #e74c3c; padding: 40px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="main-card">
    <div class="top-bar">
        <h2>أ / عبدالعزيز الفيفي ✨</h2>
        <small>محاكي القدرات اللفظي - نموذج (6)</small>
    </div>

    <div class="content">
        <!-- شاشة الدخول -->
        <div id="login-screen">
            <p style="text-align: center; color: #666;">يرجى التحقق من هويتك للمتابعة</p>
            <input type="email" id="userEmail" placeholder="sxxxxxxx@rb.moe.gov.sa">
            <button class="btn-action" onclick="verifyStudent()">التحقق والدخول 🚀</button>
            <p id="msg" style="text-align: center; margin-top: 15px;"></p>
        </div>

        <!-- شاشة الاختبار -->
        <div id="quiz-screen" style="display: none;">
            <div class="q-header">
                <span id="progress-text">سؤال 1 من 40</span>
                <span id="timer-ring">45</span>
            </div>
            <div id="q-body" class="q-box" style="display: block;">
                <div id="question-txt" class="q-text"></div>
                <div id="options-grid" class="options-list"></div>
            </div>
            <button id="next-btn" class="btn-action" style="margin-top: 25px; display: none;" onclick="goNext()">السؤال التالي ⬅</button>
        </div>

        <!-- شاشة النتيجة -->
        <div id="result-screen" style="display: none; text-align: center;">
            <h1 style="color: var(--primary);">تم الإرسال بنجاح!</h1>
            <p>درجتك النهائية هي:</p>
            <div style="font-size: 4rem; color: var(--accent); font-weight: bold;" id="final-score"></div>
            <p>سيتم توجيهك الآن للوحة النتائج العامة...</p>
        </div>
    </div>
</div>

<script>
    // تهيئة Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const quizData = [
        { type: "tan", q: "نحل : خلية", opts: ["نمل : قرية", "صقر : وكر", "خيل : إسطبل", "طير : عش"], ans: "نمل : قرية" },
        { type: "ekm", q: "إذا كنت تريد ...... السحاب، فعليك أن تترك ...... التراب.", opts: ["لمس - وطء", "رؤية - غبار", "صعود - عيش", "بلوغ - زحف"], ans: "لمس - وطء" },
        // ... أكمل بقية الأسئلة هنا بنفس النمط (type مهم جداً للوحة النتائج)
    ];

    let currentIdx = 0, score = 0, timer, student = null, userAnswers = [];

    async function verifyStudent() {
        const email = document.getElementById('userEmail').value.trim().toLowerCase();
        const msg = document.getElementById('msg');
        if(!email.includes('@')) return alert("أدخل بريداً صحيحاً");

        msg.innerText = "جاري التحقق... ⏳";
        
        try {
            // التحقق من قائمة الـ 181
            const allowed = await db.collection("allowed_students").doc(email).get();
            if(!allowed.exists) {
                msg.innerHTML = "<b style='color:red;'>عذراً، إيميلك غير مسجل في قائمة الـ 181 طالباً لهذا الاختبار.</b>";
                return;
            }

            // التحقق من التكرار[cite: 1]
            const record = await db.collection("student_results").where("email","==",email).where("model_id","==","model_6").get();
            if(!record.empty) {
                msg.innerHTML = "<b style='color:red;'>لقد اختبرت مسبقاً يا " + allowed.data().name + "</b>";
                return;
            }

            student = { email: email, name: allowed.data().name };
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        } catch(e) { alert("خطأ في الاتصال"); }
    }

    function showQuestion() {
        if(currentIdx >= quizData.length) return finishQuiz();
        
        const q = quizData[currentIdx];
        document.getElementById('progress-text').innerText = `سؤال ${currentIdx+1} من ${quizData.length}`;
        document.getElementById('question-txt').innerText = q.q;
        document.getElementById('next-btn').style.display = 'none';
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        [...q.opts].sort(() => Math.random() - 0.5).forEach(opt => {
            const div = document.createElement('div');
            div.className = 'opt-item';
            div.innerText = opt;
            div.onclick = () => checkAns(opt, q.ans, div);
            grid.appendChild(div);
        });
        
        resetTimer();
    }

    function checkAns(selected, correct, el) {
        clearInterval(timer);
        userAnswers.push({ type: quizData[currentIdx].type, isCorrect: selected === correct });
        if(selected === correct) {
            score++;
            el.classList.add('correct');
        } else {
            el.classList.add('wrong');
            Array.from(document.getElementsByClassName('opt-item')).forEach(i => {
                if(i.innerText === correct) i.classList.add('correct');
            });
        }
        document.getElementById('next-btn').style.display = 'block';
        Array.from(document.getElementsByClassName('opt-item')).forEach(i => i.onclick = null);
    }

    function resetTimer() {
        let s = 45;
        document.getElementById('timer-ring').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--;
            document.getElementById('timer-ring').innerText = s;
            if(s <= 0) { clearInterval(timer); goNext(); }
        }, 1000);
    }

    function goNext() { currentIdx++; showQuestion(); }

    async function finishQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;

        // حساب المهارات بدقة للوحة النتائج
        const getSkillPct = (t) => {
            const list = userAnswers.filter(a => a.type === t);
            return list.length ? Math.round((list.filter(a => a.isCorrect).length / list.length) * 100) : 100;
        };

        const resultData = {
            name: student.name,
            email: student.email,
            score: score,
            total: quizData.length,
            model_id: "model_6",
            time: firebase.firestore.FieldValue.serverTimestamp(),
            sections: {
                tan: getSkillPct("tan"),
                ekm: getSkillPct("ekm"),
                syq: getSkillPct("syq"),
                st:  getSkillPct("st"),
                mfr: getSkillPct("mfr")
            }
        };

        await db.collection("student_results").add(resultData);
    }
</script>
</body>
</html>
